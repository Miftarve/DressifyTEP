<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Utenti - Dressify</title>
    <link rel="stylesheet" href="prodotti.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <figure class="avatar-box">
                <img src="./assets/dressify.png" alt="Dressify Logo" width="60">
            </figure>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="user.html">Utenti</a></li>
            <li><a href="products.html">Prodotti</a></li>
        </ul>
    </nav>

    <br><br><br><br><br>
    <!-- Wrapper Vue -->
    <div id="userApp">
        <div v-for="(user, index) in users" :key="index" class="user-card">
            <h2>{{ user.name }}</h2>
            <p>Email: {{ user.email }}</p>
            <p>Telefono: {{ user.phone || 'N/A' }}</p>
            <p>Nazionalità: {{ user.nationality || 'N/A' }}</p>
            <button @click="deleteUser(user.id, index)" class="delete-button">Cancella</button>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="users.js"></script>
</body>
</html>
