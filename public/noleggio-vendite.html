<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noleggio & Vendita Moda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="noleggio-vendite.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <!-- Sidebar Filters -->
        <aside class="filters">
            <h2>Filtri di Ricerca</h2>
            <input type="text" v-model="searchQuery" placeholder="🔍 Cerca per nome o descrizione">

            <label>Prezzo Noleggio (max):</label>
            <input type="range" min="10" max="2000" step="10" v-model="filterPrice" @input="updatePrice">
            <p><strong>{{ displayedPrice }} €</strong></p>
            

            <label>Taglia:</label>
            <select v-model="filterSize">
                <option value="">Tutte</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
            </select>

            <label>Ordina per:</label>
            <select v-model="sortBy">
                <option value="price">Prezzo</option>
                <option value="brand">Marca</option>
                <option value="condition">Condizione</option>
            </select>

            <button class="btn-primary" @click="saveSearch">Salva Ricerca</button>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="noleggio-vendita.js"></script>

</body>

</html>
