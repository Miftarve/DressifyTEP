<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noleggio e Vendita Abbigliamento</title>
    <link rel="stylesheet" href="noleggio-vendite.css">
</head>
<body>
    <header>
        <h1>Noleggio e Vendita Abbigliamento</h1>
    </header>
    <main>
        <div class="container">
            <div class="card" id="ricerca-filtri-card">
                <button id="toggle-ricerca-filtri">☰</button>
                <section id="ricerca-filtri">
                    <h2>Ricerca e Filtri</h2>
                    <div id="ricerca">
                        <h3>Ricerca</h3>
                        <input type="text" id="ricerca-capo" name="ricerca-capo" placeholder="Cerca per nome o descrizione">
                        <button>Cerca</button>
                    </div>
                    <div id="filtri">
                        <h3>Filtri</h3>
                        <label for="prezzo">Prezzo:</label>
                        <input type="range" id="prezzo" name="prezzo" min="0" max="1000">
                        <label for="taglia">Taglia:</label>
                        <select id="taglia" name="taglia">
                            <option value="s">S</option>
                            <option value="m">M</option>
                            <option value="l">L</option>
                        </select>
                        <label for="marca">Marca:</label>
                        <input type="text" id="marca" name="marca">
                        <label for="condizioni">Condizioni:</label>
                        <select id="condizioni" name="condizioni">
                            <option value="nuovo">Nuovo</option>
                            <option value="usato">Usato</option>
                        </select>
                    </div>
                    <div id="salvataggio">
                        <h3>Salvataggio</h3>
                        <button>Salva Ricerca</button>
                    </div>
                </section>
            </div>
            <div class="card" id="noleggio-vendita-card">
                <section id="noleggio-vendita">
                    <h2>Noleggio e Vendita</h2>
                    <div id="prodotti-container">
                        <!-- Qui verranno mostrate le card dei prodotti -->
                    </div>
                </section>
            </div>
        </div>
        <section id="carrello">
            <h2>Carrello</h2>
            <div id="carrello-items">
                <!-- Qui verranno mostrati gli oggetti nel carrello -->
            </div>
            <button id="rimuovi-carrello">Rimuovi dal Carrello</button>
        </section>
    </main>
    <script src="noleggio-vendite.js"></script>
</body>
</html>
