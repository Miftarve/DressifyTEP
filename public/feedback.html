<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="sicurezza-feedback.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <figure class="avatar-box">
                <img src="./assets/dressify.png" alt="userInfo.name" width="60">
            </figure> <!-- Modifica il link con il tuo logo -->
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Prodotti</a></li>
            <li><a href="sicurezza.html">Sicurezza</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <h1>Feedback degli Utenti</h1>
        </header>

        <section class="feedback">
            <h2>Lascia una Recensione</h2>
            <form id="feedbackForm">
                <label for="product">Prodotto:</label>
                <input type="text" id="product" name="product" placeholder="Nome del prodotto" required>

                <label for="rating">Valutazione:</label>
                <select id="rating" name="rating" required>
                    <option value="5">★★★★★ (5/5)</option>
                    <option value="4">★★★★☆ (4/5)</option>
                    <option value="3">★★★☆☆ (3/5)</option>
                    <option value="2">★★☆☆☆ (2/5)</option>
                    <option value="1">★☆☆☆☆ (1/5)</option>
                </select>

                <label for="comment">Commento:</label>
                <textarea id="comment" name="comment" rows="4" placeholder="Scrivi la tua recensione qui..." required></textarea>

                <button type="submit">Invia Recensione</button>
            </form>
        </section>

        <footer>
            <p>&copy; 2024 Il Mio Sito. Tutti i diritti riservati.</p>
        </footer>
    </div>

    <script src="feedback.js"></script>
</body>
</html>
