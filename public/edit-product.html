<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Prodotto</title>
    <link rel="stylesheet" href="prodotti.css">
</head>
<body>

    <div id="app">
        <div class="container">
            <h1>Modifica Prodotto</h1>
            <form @submit.prevent="updateProduct" class="product-form">
                <div class="form-group">
                    <label for="category">Categoria</label>
                    <input type="text" v-model="product.category" required placeholder="es. Giacche, Accessori">
                </div>

                <div class="form-group">
                    <label for="size">Taglia</label>
                    <input type="text" v-model="product.size" required placeholder="es. S, M, L">
                </div>

                <div class="form-group">
                    <label for="color">Colore</label>
                    <input type="text" v-model="product.color" required placeholder="es. Rosso, Blu">
                </div>

                <div class="form-group">
                    <label for="brand">Marca</label>
                    <input type="text" v-model="product.brand" required placeholder="es. Nike, Adidas">
                </div>

                <div class="form-group">
                    <label for="condition">Condizione</label>
                    <select v-model="product.condition" required>
                        <option value="">Seleziona condizione</option>
                        <option value="nuovo">Nuovo</option>
                        <option value="usato">Usato</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Prezzo</label>
                    <input type="number" v-model="product.price" required placeholder="Prezzo in euro">
                </div>

                <div class="button-group">
                    <button type="submit" class="small-button">Salva Modifiche</button>
                </div>
                
            </form>
            <button @click="goBack" type="button" class="small-button">Torna alla Lista Prodotti</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="edit-product.js"></script>

</body>
</html>
