<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Prodotti</title>
    <link rel="stylesheet" href="prodotti.css">
</head>
<body>
    <h1>Gestione Prodotti</h1>
    <div id="app">
        <div class="container">

            <div class="flex-container">
                <form @submit.prevent="addProduct" class="product-form">
                    <h2>Aggiungi un Nuovo Prodotto</h2>
                    <div class="form-group">
                        <label for="category">Categoria</label>
                        <input type="text" v-model="newProduct.category" required placeholder="es. Giacche, Accessori">
                    </div>

                    <div class="form-group">
                        <label for="size">Taglia</label>
                        <input type="text" v-model="newProduct.size" required placeholder="es. S, M, L">
                    </div>

                    <div class="form-group">
                        <label for="color">Colore</label>
                        <input type="text" v-model="newProduct.color" required placeholder="es. Rosso, Blu">
                    </div>

                    <div class="form-group">
                        <label for="brand">Marca</label>
                        <input type="text" v-model="newProduct.brand" required placeholder="es. Nike, Adidas">
                    </div>

                    <div class="form-group">
                        <label for="condition">Condizione</label>
                        <select v-model="newProduct.condition" required>
                            <option value="">Seleziona condizione</option>
                            <option value="nuovo">Nuovo</option>
                            <option value="usato">Usato</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="price">Prezzo</label>
                        <input type="number" v-model="newProduct.price" required placeholder="Prezzo in euro">
                    </div>

                    <button type="submit">Aggiungi Prodotto</button>
                </form>

                <div class="product-list">
                    <h2>Lista Prodotti</h2>
                    <ul>
                        <li v-for="(product, index) in products" :key="index" class="product-item">
                            <span>{{ product.category }} - {{ product.size }} - {{ product.color }} - {{ product.brand }} - {{ product.condition }} - €{{ product.price }}</span>
                            <div class="button-group">
                                <button @click="editProduct(index)">Modifica</button>
                                <button @click="removeProduct(index)" class="remove-button">Rimuovi</button>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="products.js"></script>

</body>
</html>
