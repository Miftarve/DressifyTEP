<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dressify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <div class="container">
            <h1><span class="highlight">D</span>ressify</h1>
            <p class="tagline">Il tuo guardaroba digitale di lusso</p>
            <form @submit.prevent="handleLogin">
                <label for="email">Email</label>
                <input type="email" v-model="email" required placeholder="Inserisci la tua email">

                <label for="password">Password</label>
                <input type="password" v-model="password" required placeholder="Inserisci la tua password">

                <button type="submit">Login</button>
            </form>
            <p>Non hai un account? <a href="login.html">Registrati qui</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="login.js"></script>
</body>
</html>
